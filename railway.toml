[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && npm --prefix frontend ci && npm --prefix frontend run build && python manage.py collectstatic --noinput"

[deploy]
startCommand = "python manage.py migrate && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
